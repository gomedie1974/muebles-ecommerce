<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Visual | Glattam Amoblamientos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
      background-image: url(./img/e7334e92-banner.jpg);
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
    }

    .container-registro {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 100px 40px 40px;
    }

    .card-registro {
      background: #f3eee7; /* beige cálido */
      border-radius: 20px;
      padding: 50px 40px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
      border: 1px solid #e0d6c8;
    }

    .card-registro h3 {
      color: #4b2e1e; /* madera oscura */
      margin-bottom: 35px;
      text-align: center;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 18px;
    }

    .input-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #8b7a6b;
    }

    .form-control {
      border-radius: 10px;
      padding-left: 40px;
      padding-right: 40px; /* Espacio para el ojo */
    }

    .eye-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #8b7a6b;
    }

    .btn-registro {
      background-color: #0d6efd; /* azul Bootstrap */
      color: #fff;               /* texto blanco */
      border: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn-registro:hover {
      background-color: #0b5ed7; /* azul más oscuro al pasar el mouse */
      color: #fff;
    }
    .form-check-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      font-size: 14px;
      color: #49485c;
      margin-bottom: 20px;
    }

    .form-check-wrapper input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4b2e1e;
    }

    p.text-center a {
      color: #4b2e1e;
      font-weight: 500;
      text-decoration: none;
    }

    p.text-center a:hover {
      color: #6a3f28;
    }

    @media (max-width: 991px) {
      .card-registro {
        max-width: 100%;
        padding: 40px 30px;
      }
    }
  </style>
</head>
<body>

<div id="navbar-container"></div>

<div class="container-registro">
  <div class="card card-registro">
    <h3>Crear cuenta</h3>

    <div class="mb-3 input-wrapper">
      <i class="bi bi-person icon-input"></i>
      <input type="text" id="nombre" class="form-control" placeholder="Nombre">
    </div>

    <div class="mb-3 input-wrapper">
      <i class="bi bi-person icon-input"></i>
      <input type="text" id="apellido" class="form-control" placeholder="Apellido">
    </div>

    <div class="mb-3 input-wrapper">
      <i class="bi bi-geo-alt icon-input"></i>
      <input type="text" id="domicilio" class="form-control" placeholder="Domicilio">
    </div>

    <div class="mb-3 input-wrapper">
      <i class="bi bi-building icon-input"></i>
      <input type="text" id="localidad" class="form-control" placeholder="Localidad">
    </div>

    <div class="mb-3 input-wrapper">
      <i class="bi bi-telephone icon-input"></i>
      <input type="text" id="telefono" class="form-control" placeholder="Teléfono">
    </div>

    <div class="mb-3 input-wrapper">
      <i class="bi bi-envelope icon-input"></i>
      <input type="email" id="email" class="form-control" placeholder="Email" autocomplete="off">
    </div>

    <div class="mb-3 input-wrapper">
      <i class="bi bi-lock icon-input"></i>
      <input type="password" id="password" class="form-control" placeholder="Contraseña" autocomplete="new-password">
      <i class="bi bi-eye eye-icon" id="eyeIcon"></i>
    </div>

    <div class="form-check-wrapper">
      <input type="checkbox" id="aceptaPolitica">
      <label for="aceptaPolitica">
        Acepto la <a href="politicas-y-condiciones.html" target="_blank">Política de Privacidad</a>
      </label>
    </div>

    <button class="btn btn-registro w-100 mb-3" id="btnRegister" disabled>Registrarse</button>

    <p class="text-center text-muted">
      ¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a>
    </p>
  </div>
</div>

<!-- Modal de éxito -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="successModalLabel">¡Éxito!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>¡Tu cuenta ha sido creada con éxito!</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal de error -->
<div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="errorModalLabel">¡Vaya, algo salió mal!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="errorMessage"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<div id="footer"></div>

<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCU79ZWBAHThRPVp44voMXIC42zq6abS4Y",
  authDomain: "muebles-ecommerce-d8fc0.firebaseapp.com",
  projectId: "muebles-ecommerce-d8fc0",
  storageBucket: "muebles-ecommerce-d8fc0.firebasestorage.app",
  messagingSenderId: "724872861374",
  appId: "1:724872861374:web:d94cbd14d1b790d391b0ef",
  measurementId: "G-59W8JTZPXR"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const aceptaPolitica = document.getElementById("aceptaPolitica");
const btnRegister = document.getElementById("btnRegister");

// Habilitar botón solo si checkbox está marcado
aceptaPolitica.addEventListener("change", () => {
  btnRegister.disabled = !aceptaPolitica.checked;
});

// Registro de usuario
btnRegister.addEventListener("click", () => {
  const nombre = document.getElementById("nombre").value.trim();
  const apellido = document.getElementById("apellido").value.trim();
  const domicilio = document.getElementById("domicilio").value.trim();
  const localidad = document.getElementById("localidad").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!nombre || !apellido || !domicilio || !localidad || !telefono || !email || !password) {
    mostrarModalError("Por favor completá todos los campos.");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {
      const user = userCredential.user;
      db.collection("usuarios").doc(user.uid).set({
        nombre,
        apellido,
        domicilio,
        localidad,
        telefono,
        email
      }).then(() => {
        mostrarModalExito();
        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
      });
    })
    .catch(error => {
      if (error.code === "auth/email-already-in-use") {
        mostrarModalError("Este correo ya está registrado. Por favor iniciá sesión o usá otro email.");
      } else {
        mostrarModalError("Error: " + error.message);
      }
    });
});

// Modales
function mostrarModalExito() {
  const modal = new bootstrap.Modal(document.getElementById("successModal"));
  modal.show();
}
function mostrarModalError(message) {
  document.getElementById("errorMessage").textContent = message;
  const modal = new bootstrap.Modal(document.getElementById("errorModal"));
  modal.show();
}

// Mostrar/ocultar contraseña
const eyeIcon = document.getElementById("eyeIcon");
const passwordField = document.getElementById("password");

eyeIcon.addEventListener("click", () => {
  const type = passwordField.type === "password" ? "text" : "password";
  passwordField.type = type;
  eyeIcon.classList.toggle("bi-eye-slash");
});
</script>

</body>
</html>
